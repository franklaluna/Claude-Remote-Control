name: ClaudeRemoteControl
options:
  bundleIdPrefix: com.claude.remote
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: "9CZ5U4FQNM"
    CODE_SIGN_STYLE: Automatic

targets:
  ClaudeRemoteControl:
    type: application
    platform: iOS
    sources:
      - path: Claude-Remote-Control
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claude.remote.control
        INFOPLIST_FILE: Claude-Remote-Control/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "9CZ5U4FQNM"
        CODE_SIGN_STYLE: Automatic
